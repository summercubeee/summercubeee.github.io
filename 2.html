<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>버터떡 전국 지도</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
    :root {
        --butter-gold: #fbbf24;
        --butter-deep: #f59e0b;
        --bg-dark: #020617;
        --accent-gold: #fbbf24;
        --card-bg: #020617;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: var(--bg-dark);
        color:#fff;
        font-family: system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;
        line-height:1.7;
        word-break: keep-all;
        overflow-x:hidden;
    }

    .layout {
        max-width: 1440px;
        margin: 0 auto;
        padding: 40px 16px 80px;
    }

    h1 {
        font-size: clamp(2.4rem, 4vw, 3.2rem);
        margin-bottom: 10px;
    }
    .subtitle {
        color:#9ca3af;
        margin-bottom: 24px;
    }

    /* 지도 영역 */
    .map-wrap {
        position: relative;
        display:flex;
        gap:32px;
        flex-wrap:wrap;
        align-items:flex-start;
    }
    .map-container {
        position: relative;
        flex:1 1 420px;
        min-width:320px;
        aspect-ratio: 0.8;
        border:2px double rgba(251,191,36,0.4);
        background: radial-gradient(circle at top, rgba(250,204,21,0.08), transparent 55%);
        padding:16px;
        overflow:hidden;
    }
    .korea-svg {
        width:100%;
        height:100%;
        filter: drop-shadow(0 0 18px rgba(250,204,21,0.45));
    }
    .region-path {
        fill: url(#goldGradient);
        stroke:#facc15;
        stroke-width:0.4;
        cursor:pointer;
        transition:0.3s ease;
    }
    .region-path:hover,
    .region-path.active-region {
        fill:#fff;
        filter: drop-shadow(0 0 30px rgba(250,204,21,0.9));
    }
    .region-label {
        pointer-events:none;
        font-size:4px;
        fill:#020617;
        font-weight:bold;
    }

    /* 지도 위 포인트 */
    .map-points-layer {
        position:absolute;
        inset:16px;
        pointer-events:none;
    }
    .map-point {
        position:absolute;
        width:13px;
        height:13px;
        border-radius:50%;
        background:rgba(251,191,36,0.9);
        border:2px solid #fff;
        box-shadow:0 0 18px rgba(250,204,21,0.9);
        transform:translate(-50%, -50%);
        cursor:pointer;
        pointer-events:auto;
        transition:transform .25s, background .25s, box-shadow .25s;
        z-index:5;
    }
    .map-point:hover {
        transform:translate(-50%, -50%) scale(1.5);
        background:#fff;
        box-shadow:0 0 30px rgba(250,204,21,1);
    }
    .map-point .point-tooltip {
        position:absolute;
        left:50%;
        bottom:18px;
        transform:translateX(-50%);
        background:rgba(15,23,42,0.95);
        border:1px solid rgba(250,204,21,0.7);
        border-radius:4px;
        padding:6px 9px;
        font-size:11px;
        white-space:nowrap;
        opacity:0;
        visibility:hidden;
        transition:.2s;
        pointer-events:none;
        color:#e5e7eb;
    }
    .map-point:hover .point-tooltip {
        opacity:1;
        visibility:visible;
        bottom:22px;
    }

    /* 지도 우측 팝업 */
    .map-popup {
        flex:0 1 320px;
        min-width:280px;
        background:rgba(15,23,42,0.9);
        border-radius:10px;
        border:1px solid rgba(148,163,184,0.5);
        padding:20px;
        box-shadow:0 18px 50px rgba(0,0,0,0.5);
        transform-origin: top right;
        transform: scale(0.96) translateY(10px);
        opacity:0;
        pointer-events:none;
        transition:.25s ease;
    }
    .map-popup.visible {
        opacity:1;
        pointer-events:auto;
        transform: scale(1) translateY(0);
    }
    .map-popup-title {
        font-size:1.1rem;
        margin-bottom:6px;
    }
    .map-popup-region {
        font-size:0.85rem;
        color:#facc15;
        margin-bottom:12px;
    }
    .map-popup-desc {
        font-size:0.9rem;
        color:#cbd5e1;
        margin-bottom:16px;
    }
    .map-popup-buttons {
        display:flex;
        gap:10px;
        flex-wrap:wrap;
    }
    .btn {
        flex:1;
        border-radius:999px;
        padding:9px 14px;
        font-size:0.9rem;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:6px;
        cursor:pointer;
        border:1px solid transparent;
        transition:.2s;
        text-decoration:none;
    }
    .btn-outline {
        background:transparent;
        color:#facc15;
        border-color:#facc15;
    }
    .btn-outline:hover {
        background:#facc15;
        color:#111827;
    }
    .btn-solid {
        background:var(--butter-deep);
        color:#111827;
    }
    .btn-solid:hover {
        background:#fff;
    }

    /* 하단 카드 영역 */
    .list-wrap {
        margin-top:56px;
    }
    .list-header {
        display:flex;
        justify-content:space-between;
        align-items:flex-end;
        gap:16px;
        margin-bottom:18px;
        flex-wrap:wrap;
    }
    .list-header h2 {
        font-size:1.4rem;
    }
    .current-filter {
        font-size:0.85rem;
        color:#e5e7eb;
    }
    .reset-btn {
        border-radius:999px;
        border:1px solid rgba(148,163,184,0.7);
        background:transparent;
        color:#e5e7eb;
        padding:4px 10px;
        font-size:0.8rem;
        cursor:pointer;
    }
    .reset-btn:hover {
        background:#facc15;
        color:#111827;
    }

    .card-grid {
        display:grid;
        grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
        gap:20px;
    }
    .spot-card {
        background:var(--card-bg);
        border-radius:10px;
        border:1px solid rgba(30,64,175,0.5);
        padding:18px 18px 16px;
        transition:.3s;
        cursor:pointer;
        position:relative;
        overflow:hidden;
    }
    .spot-card::before {
        content:"";
        position:absolute;
        inset:0;
        background:radial-gradient(circle at top left, rgba(250,204,21,0.18), transparent 55%);
        opacity:0;
        transition:.4s;
        pointer-events:none;
    }
    .spot-card.expanded::before {
        opacity:1;
    }
    .spot-card.hidden {
        display:none;
    }
    .spot-card-head {
        font-size:0.8rem;
        color:#facc15;
        letter-spacing:2px;
        text-transform:uppercase;
        margin-bottom:6px;
    }
    .spot-card-title {
        font-size:1.1rem;
        margin-bottom:6px;
    }
    .spot-card-desc {
        font-size:0.9rem;
        color:#cbd5e1;
        max-height:3.2em;
        overflow:hidden;
        margin-bottom:10px;
    }
    .spot-card-extra {
        max-height:0;
        overflow:hidden;
        transition:max-height .3s ease;
    }
    .spot-card.expanded .spot-card-extra {
        max-height:200px;
    }
    .spot-card-actions {
        margin-top:10px;
        display:flex;
        gap:8px;
        flex-wrap:wrap;
    }

    .badge-region {
        display:inline-flex;
        align-items:center;
        gap:6px;
        font-size:0.78rem;
        color:#9ca3af;
    }

    @media (max-width: 768px) {
        .map-wrap { flex-direction:column; }
        .map-popup { order:2; width:100%; }
        .map-container { order:1; }
    }
</style>
</head>
<body>
<div class="layout">
    <header>
        <h1>황금 버터떡 실측 지도</h1>
        <p class="subtitle">
            사진 기반 커스텀 한국 지도 위에 실제 버터떡 명소를 박아서, 지역별로 한 번에 내려다보는 버터떡 아틀라스입니다.
        </p>
    </header>

    <!-- 상단: 지도 + 지역 팝업 -->
    <section class="map-wrap">
        <div class="map-container">
            <!-- ① 여기 SVG를 "사진에서 트레이싱한 커스텀 지도"로 교체하면 됨 -->
            <svg class="korea-svg" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%"  style="stop-color:#fff7ad;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
                    </linearGradient>
                </defs>

                <!-- ★ TODO: 실제 사진 기반 커스텀 실루엣으로 path들을 교체 -->
                <!-- 여기서는 서울/경기/부산 등 최소한만 구획을 나눈 단순 버전 예시 -->

                <!-- 서울 -->
                <path class="region-path" data-region="seoul"
                      d="M90 60 L105 60 L108 68 L100 75 L90 70 Z" />
                <text x="95" y="66" class="region-label">서울</text>

                <!-- 경기 -->
                <path class="region-path" data-region="gyeonggi"
                      d="M75 50 L120 50 L128 68 L118 85 L90 85 L72 72 Z" />
                <text x="78" y="58" class="region-label">경기</text>

                <!-- 인천 -->
                <path class="region-path" data-region="incheon"
                      d="M68 55 L75 50 L72 72 L62 74 Z" />
                <text x="64" y="63" class="region-label">인천</text>

                <!-- 부산 -->
                <path class="region-path" data-region="busan"
                      d="M120 170 L132 170 L136 182 L125 192 L115 184 Z" />
                <text x="120" y="177" class="region-label">부산</text>

                <!-- 제주는 아래쪽에 -->
                <path class="region-path" data-region="jeju"
                      d="M78 215 Q100 210 122 215 Q100 220 78 215 Z" />
                <text x="95" y="214" class="region-label">제주</text>
            </svg>

            <!-- 포인트 레이어 -->
            <div class="map-points-layer" id="map-points-layer"></div>
        </div>

        <!-- 지역 팝업 -->
        <aside class="map-popup" id="map-popup">
            <div class="map-popup-region" id="popup-region-label">지역 선택 대기</div>
            <div class="map-popup-title" id="popup-title">지도를 클릭해 주세요</div>
            <p class="map-popup-desc" id="popup-desc">
                서울, 경기, 부산 등 특정 지역을 클릭하면 해당 권역의 버터떡 성지 목록과
                바로 탐색/구매 버튼이 이 박스에 나타납니다.
            </p>
            <div class="map-popup-buttons" id="popup-buttons">
                <!-- JS에서 버튼 2개를 넣어줌 -->
            </div>
        </aside>
    </section>

    <!-- 하단: 카드 리스트 -->
    <section class="list-wrap">
        <div class="list-header">
            <div>
                <h2>전국 버터떡 명소 카드</h2>
                <div class="badge-region">
                    현재 필터:
                    <span id="current-filter">전체</span>
                </div>
            </div>
            <button class="reset-btn" type="button" onclick="clearRegionFilter()">전체 보기</button>
        </div>

        <div class="card-grid" id="card-grid"></div>
    </section>
</div>

<script>
/*
    spots: 실제 명소 데이터
    region: seoul / gyeonggi / busan / jeju 등
    x, y: 지도 박스 내 퍼센트 좌표 (0~100)
*/
const spots = [
    // 서울·경기 예시
    { id: 1, region: 'seoul',   name: '새들러하우스',      loc: '서울 강남구 신사동', desc: '상하이식 버터 쫀득떡, 플레인·초코·치즈까지 라인업 완비.', x: 52, y: 54 },
    { id: 2, region: 'seoul',   name: '이웃집통통이',      loc: '서울 강남구 선릉로', desc: '글루텐 프리 스타일 버터떡으로 이름난 집.', x: 50, y: 57 },
    { id: 3, region: 'seoul',   name: '하우스엠',          loc: '서울 강남구 논현동', desc: '하트 모양 버터떡, 겉바속쫀의 끝판왕.', x: 54, y: 59 },
    { id: 4, region: 'gyeonggi',name: '하츠베이커리 성수', loc: '서울 성동구 성수동', desc: '왕버터떡으로 유명한 성수 디저트 스팟.', x: 58, y: 52 },
    // 부산 예시
    { id: 5, region: 'busan',   name: '희와제과',          loc: '부산 진구',         desc: '버터 팥 크림과 떡 식감이 결합된 인기 메뉴.', x: 78, y: 80 },
    { id: 6, region: 'busan',   name: '명가떡집 전포',      loc: '부산 전포동',       desc: '앙버터 설기로 유명한 떡집.', x: 82, y: 83 },
    // 제주 예시
    { id: 7, region: 'jeju',    name: '오메기떡 명소',      loc: '제주 제주시',       desc: '오메기떡과 버터 크림을 조합한 제주 감성.', x: 60, y: 93 },
    { id: 8, region: 'jeju',    name: '아베베 베이커리',    loc: '제주 애월',         desc: '제주 재료와 버터 떡·도넛을 함께 즐길 수 있는 곳.', x: 66, y: 96 }
    // 여기에 계속 추가하면 됨
];

const regionLabelMap = {
    seoul: '서울',
    gyeonggi: '경기',
    incheon: '인천',
    busan: '부산',
    jeju: '제주'
};

const mapPointsLayer = document.getElementById('map-points-layer');
const cardGrid = document.getElementById('card-grid');
const popupEl = document.getElementById('map-popup');
const popupRegionLabel = document.getElementById('popup-region-label');
const popupTitle = document.getElementById('popup-title');
const popupDesc = document.getElementById('popup-desc');
const popupButtons = document.getElementById('popup-buttons');
const currentFilterEl = document.getElementById('current-filter');

/* 1) 지도 위 포인트 + 하단 카드 생성 */
spots.forEach(spot => {
    // 지도 포인트
    const point = document.createElement('div');
    point.className = 'map-point';
    point.style.left = `${spot.x}%`;
    point.style.top = `${spot.y}%`;
    point.dataset.id = spot.id;
    point.dataset.region = spot.region;
    point.innerHTML = `
        <div class="point-tooltip">${spot.name}<br/><span style="color:#9ca3af;font-size:11px;">${spot.loc}</span></div>
    `;
    point.addEventListener('click', () => {
        // 포인트 클릭 → 해당 카드 확장 + 스크롤
        selectCardById(spot.id);
    });
    mapPointsLayer.appendChild(point);

    // 카드
    const card = document.createElement('article');
    card.className = 'spot-card';
    card.id = `card-${spot.id}`;
    card.dataset.region = spot.region;
    card.innerHTML = `
        <div class="spot-card-head">${regionLabelMap[spot.region] || spot.region}</div>
        <div class="spot-card-title">${spot.name}</div>
        <div class="spot-card-desc">${spot.desc}</div>
        <div class="spot-card-extra">
            <div style="font-size:0.85rem; color:#e5e7eb; margin-bottom:8px;">
                📍 ${spot.loc}
            </div>
            <div class="spot-card-actions">
                <a href="https://map.naver.com/v5/search/${encodeURIComponent(spot.name)}"
                   class="btn btn-outline" target="_blank">
                    지도에서 탐색하기
                </a>
                <button type="button" class="btn btn-solid"
                        onclick="openShopFor('${spot.name.replace(/'/g, "\\'")}');event.stopPropagation();">
                    인터넷 쇼핑몰에서 구매하기
                </button>
            </div>
        </div>
    `;
    card.addEventListener('click', () => {
        toggleCardExpand(card.id);
    });
    cardGrid.appendChild(card);
});

/* 2) 카드 확장 애니메이션 */
function toggleCardExpand(cardId) {
    const card = document.getElementById(cardId);
    const isExpanded = card.classList.contains('expanded');
    document.querySelectorAll('.spot-card.expanded').forEach(c => c.classList.remove('expanded'));
    if (!isExpanded) {
        card.classList.add('expanded');
        card.scrollIntoView({ behavior:'smooth', block:'center' });
    }
}

function selectCardById(id) {
    const card = document.getElementById(`card-${id}`);
    if (!card) return;
    document.querySelectorAll('.spot-card.expanded').forEach(c => c.classList.remove('expanded'));
    card.classList.add('expanded');
    card.scrollIntoView({ behavior:'smooth', block:'center' });
}

/* 3) 지도 영역 클릭 → 팝업(버튼 2개) 업데이트 + 카드 필터 */
document.querySelectorAll('.region-path').forEach(path => {
    path.addEventListener('click', () => {
        const regionKey = path.dataset.region;
        const regionName = regionLabelMap[regionKey] || regionKey;
        // 지도 경계 active
        document.querySelectorAll('.region-path').forEach(p => p.classList.remove('active-region'));
        path.classList.add('active-region');

        // 팝업 콘텐츠 업데이트
        popupRegionLabel.textContent = regionName;
        popupTitle.textContent = regionName + " 버터떡 라인업";
        popupDesc.textContent = regionName + " 지역에 등록된 버터떡 명소만 아래 카드에 표시됩니다. "
            + "지도에서 탐색하거나, 인터넷에서 해당 상호를 바로 검색해 구매할 수 있습니다.";
        popupButtons.innerHTML = '';

        // 버튼 1: 지도에서 탐색하기(네이버 지도에 region 키워드 검색)
        const btnMap = document.createElement('a');
        btnMap.className = 'btn btn-outline';
        btnMap.href = 'https://map.naver.com/v5/search/' + encodeURIComponent(regionName + ' 버터떡');
        btnMap.target = '_blank';
        btnMap.textContent = '지도에서 탐색하기';
        popupButtons.appendChild(btnMap);

        // 버튼 2: 인터넷 구매하기(쿠팡/스마트스토어 등 키워드 검색)
        const btnShop = document.createElement('a');
        btnShop.className = 'btn btn-solid';
        btnShop.href = 'https://search.shopping.naver.com/search/all?query=' + encodeURIComponent(regionName + ' 버터떡');
        btnShop.target = '_blank';
        btnShop.textContent = '인터넷 구매하기';
        popupButtons.appendChild(btnShop);

        popupEl.classList.add('visible');

        // 하단 카드 필터링
        applyRegionFilter(regionKey, regionName);
    });

    path.addEventListener('mouseover', () => path.classList.add('hovered'));
    path.addEventListener('mouseout', () => path.classList.remove('hovered'));
});

/* 4) 필터링 */
function applyRegionFilter(regionKey, label) {
    document.querySelectorAll('.spot-card').forEach(card => {
        card.classList.toggle('hidden', card.dataset.region !== regionKey);
    });
    document.querySelectorAll('.map-point').forEach(point => {
        point.style.display = (point.dataset.region === regionKey) ? 'block' : 'none';
    });
    currentFilterEl.textContent = label;
}
function clearRegionFilter() {
    document.querySelectorAll('.region-path').forEach(p => p.classList.remove('active-region'));
    document.querySelectorAll('.spot-card').forEach(card => card.classList.remove('hidden'));
    document.querySelectorAll('.map-point').forEach(point => point.style.display = 'block');
    currentFilterEl.textContent = '전체';
    popupEl.classList.remove('visible');
}

/* 5) 인터넷 쇼핑몰 구매 버튼 기본 동작 */
function openShopFor(name) {
    const url = 'https://search.shopping.naver.com/search/all?query=' + encodeURIComponent(name + ' 버터떡');
    window.open(url, '_blank');
}
</script>
</body>
</html>
