<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 버터떡 비기 | 대백과 전도</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Song+Myung&display=swap');

        :root {
            --butter-gold: #fbbf24;
            --butter-deep: #f59e0b;
            --bg-dark: #020617;
            --naver-green: #03c75a;
            --buy-orange: #ff6b00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Noto Serif KR', serif;
            overflow-x: hidden;
            word-break: keep-all;
            scroll-behavior: smooth;
        }

        .ads-notice {
            background: #111; color: #777; font-size: 0.75rem; padding: 10px; text-align: center; border-bottom: 1px solid #222;
        }

        .official-notice {
            background: var(--butter-deep); color: #000; padding: 12px; text-align: center;
            font-weight: 900; font-size: 0.85rem; position: sticky; top: 0; z-index: 1000;
        }

        .hero { padding: 60px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .main-title {
            font-family: 'Song Myung', serif;
            font-size: clamp(2.5rem, 7vw, 5rem);
            background: linear-gradient(to bottom, #fff, var(--butter-gold), var(--butter-deep));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .hero-buy-btn {
            background: var(--buy-orange); color: #fff; padding: 15px 40px; border-radius: 50px;
            font-weight: 900; font-size: 1.1rem; margin-bottom: 40px; border: none; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.3); transition: 0.3s;
        }
        .hero-buy-btn:hover { transform: scale(1.05); background: #ff8533; }

        /* 지도 섹션 */
        .map-wrapper {
            position: relative; max-width: 900px; width: 100%; margin: 20px 0;
            border: 2px solid var(--butter-gold); background: #000; padding: 10px;
        }
        .real-map { width: 100%; height: auto; display: block; opacity: 0.8; }

        .marker {
            position: absolute; width: 22px; height: 22px; background: #fff;
            border: 4px solid var(--butter-deep); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 15px var(--butter-gold); z-index: 10; transition: 0.3s;
        }
        .marker:hover { transform: scale(1.4); background: var(--butter-gold); }
        .marker-tooltip {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); border: 1px solid var(--butter-gold);
            color: #fff; padding: 5px 12px; border-radius: 4px; font-size: 0.85rem;
            white-space: nowrap; opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .marker:hover .marker-tooltip { opacity: 1; visibility: visible; }

        /* 리스트 그리드 */
        .content-list {
            max-width: 1200px; margin: 40px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(251, 191, 36, 0.1);
            padding: 25px; scroll-margin-top: 130px; transition: 0.4s;
        }
        .card:hover { border-color: var(--butter-gold); background: rgba(255,255,255,0.06); }
        .card-tag { display: inline-block; background: #222; color: var(--butter-gold); font-size: 0.7rem; padding: 2px 8px; margin-bottom: 10px; border-radius: 2px; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn {
            padding: 10px 5px; border-radius: 4px; text-decoration: none; font-size: 0.75rem;
            font-weight: bold; text-align: center; transition: 0.3s; cursor: pointer; border: none;
        }
        .btn-naver { border: 1px solid var(--naver-green); color: var(--naver-green); background: transparent; }
        .btn-naver:hover { background: var(--naver-green); color: #fff; }
        .btn-buy { border: 1px solid var(--buy-orange); color: var(--buy-orange); background: transparent; }
        .btn-buy:hover { background: var(--buy-orange); color: #fff; }

        footer { padding: 60px; text-align: center; border-top: 1px solid #111; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="ads-notice">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div>

<div class="official-notice">
    ⚠️ 전화번호, 주소, 시간, 금액 정보는 반드시 공식 페이지에서 재확인하십시오. 정보는 변경될 수 있으므로 공식 링크 확인이 필수입니다.
</div>

<section class="hero">
    <h1 class="main-title">전국 버터떡 대백과</h1>
    <button onclick="showCoupangPopup()" class="hero-buy-btn">🔥 인기 버터떡 구매하기</button>

    <div class="map-wrapper">
        <img src="http://bigfatcat.kr/wp-content/uploads/2026/03/스크린샷-2026-03-20-000001.png" class="real-map">
        <div id="map-points"></div>
    </div>
</section>

<div class="content-list" id="card-grid"></div>

<footer>
    <p>정보는 틀릴 수 있고 변경될 수 있으므로 공식 링크에서 다시 확인하세요.</p>
    <p style="margin-top:10px;">&copy; 2026 전국 버터떡 명소 총합 에디션</p>
</footer>

<script>
    // 지역별 지도 포인트 데이터 (수정사항2 반영)
    const regions = [
        { name: "서울", x: 45, y: 28 }, { name: "경기", x: 42, y: 22 }, { name: "인천", x: 38, y: 30 },
        { name: "강원", x: 60, y: 20 }, { name: "충북", x: 55, y: 45 }, { name: "충남", x: 40, y: 55 },
        { name: "대전", x: 50, y: 58 }, { name: "경북", x: 70, y: 55 }, { name: "대구", x: 68, y: 65 },
        { name: "전북", x: 42, y: 70 }, { name: "전남", x: 35, y: 85 }, { name: "광주", x: 38, y: 78 },
        { name: "경남", x: 60, y: 80 }, { name: "부산", x: 75, y: 85 }, { name: "제주", x: 40, y: 95 }
    ];

    // 상호명 리스트 데이터 (수정사항1 반영)
    const spots = [
        { name: "새들러하우스", feature: "상하이식 버터 쫀득떡(플레인·초코·치즈)", location: "서울 강남구" },
        { name: "이웃집통통이", feature: "글루텐 프리 상하이 버터떡, 국내 초창기", location: "서울 강남구·마포구" },
        { name: "하우스엠", feature: "하트 모양 겉바속쫀 버터떡", location: "서울 강남구" },
        { name: "하츠베이커리 성수", feature: "왕버터떡(대형 버터떡)", location: "서울 성동구" },
        { name: "늘해피", feature: "버터떡 2개·5개 묶음 판매", location: "서울 강남구" },
        { name: "구십이도", feature: "밤톨 모양 버터떡", location: "서울 광진구" },
        { name: "카페봉맨션", feature: "카페 버터떡 메뉴 판매", location: "서울 서대문구" },
        { name: "오우드(Oude)", feature: "마들렌 모양 버터떡", location: "서울 성동구" },
        { name: "데이라이트", feature: "디저트 플래터에 버터떡 구성", location: "서울 구로구 일대" },
        { name: "온기", feature: "자라메 설탕·플뢰르드셀 단짠 버터떡", location: "서울 서초구 일대" },
        { name: "카페 이오이", feature: "하트 모양 버터떡, 1개 1,500원", location: "서울 마포구" },
        { name: "좋은자리", feature: "떡구이·버터구이 안주, 버터떡 류", location: "서울 강남구(가로수길)" },
        { name: "오복떡집", feature: "떡구이·버터 떡구이류, 버터떡 계열", location: "서울 성동구(성수동)" },
        { name: "정애맛담", feature: "전통 떡+버터 담백한 버터 떡구이", location: "서울 관악구(샤로수길)" },
        { name: "도올쇠 서울대입구", feature: "술안주형 버터 떡구이", location: "서울 관악구" },
        { name: "수제과점", feature: "상하이 버터떡 전문, 인천 맛집", location: "인천 미추홀구" },
        { name: "오브더밀", feature: "상하이 버터떡, 안성 버터떡 맛집", location: "경기 안성시" },
        { name: "비에델", feature: "평택 고덕 버터떡 맛집으로 언급", location: "경기 평택시" },
        { name: "광주 BBB 등(복수)", feature: "광주 버터떡 핫플 모음(여러 카페)", location: "광주광역시" },
        { name: "기타 서울 카페 N곳", feature: "노원·사당·성수 등 76곳 중 일부", location: "서울·경기 다수" }
    ];

    const pointContainer = document.getElementById('map-points');
    const cardGrid = document.getElementById('card-grid');

    // 지도 포인트 생성 (지역별 검색 연동)
    regions.forEach(r => {
        const marker = document.createElement('div');
        marker.className = 'marker';
        marker.style.left = `${r.x}%`;
        marker.style.top = `${r.y}%`;
        marker.innerHTML = `<div class="marker-tooltip">${r.name} 버터떡 찾기</div>`;
        
        // 클릭 시 네이버 지도 해당 지역 검색 결과로 이동
        marker.onclick = () => {
            window.open(`https://map.naver.com/v5/search/${encodeURIComponent(r.name + ' 버터떡')}`, '_blank');
        };
        pointContainer.appendChild(marker);
    });

    // 리스트 카드 생성
    spots.forEach((s, index) => {
        cardGrid.innerHTML += `
            <div class="card">
                <span class="card-tag">${s.location}</span>
                <h3 style="color:var(--butter-gold); margin-bottom:8px;">${s.name}</h3>
                <p style="font-size:0.85rem; color:#ccc; line-height:1.6; height:3.2em; overflow:hidden;">${s.feature}</p>
                <div class="button-group">
                    <a href="https://map.naver.com/v5/search/${encodeURIComponent(s.name)}" target="_blank" class="btn btn-naver">📍 지도 확인</a>
                    <button onclick="showCoupangPopup()" class="btn btn-buy">🛒 인터넷 구매</button>
                </div>
            </div>
        `;
    });

    function showCoupangPopup() {
        alert("쿠팡을 여기다 걸면 됩니다");
    }
</script>
</body>
</html>
