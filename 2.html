<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 버터떡 비기 | 대백과 전도 & 구매가이드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Song+Myung&display=swap');

        :root {
            --butter-gold: #fbbf24;
            --butter-deep: #f59e0b;
            --bg-dark: #020617;
            --coupang-orange: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Noto Serif KR', serif;
            overflow-x: hidden;
            word-break: keep-all;
            scroll-behavior: smooth;
        }

        /* --- 공정위 문구 (최상단) --- */
        .ads-notice {
            background: #111;
            color: #777;
            font-size: 0.75rem;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        /* --- 배경 효과 --- */
        #butter-dust { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }

        .official-notice {
            background: var(--butter-deep);
            color: #000;
            padding: 12px;
            text-align: center;
            font-weight: 900;
            font-size: 0.85rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .hero { padding: 60px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .main-title {
            font-family: 'Song Myung', serif;
            font-size: clamp(2.5rem, 7vw, 5rem);
            background: linear-gradient(to bottom, #fff, var(--butter-gold), var(--butter-deep));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- 지도 구역 --- */
        .map-wrapper {
            position: relative;
            max-width: 800px;
            width: 100%;
            margin: 30px 0;
            border: 2px solid var(--butter-gold);
        }
        .real-map { width: 100%; height: auto; display: block; }

        .marker {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #fff;
            border: 3px solid var(--butter-deep);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--butter-gold);
            z-index: 10;
        }

        /* --- 버튼 공통 스타일 --- */
        .buy-button {
            display: inline-block;
            background: var(--coupang-orange);
            color: #fff;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            margin: 15px 0;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        .buy-button:hover { transform: scale(1.05); background: #ff0000; }

        .card-buy-btn {
            display: block;
            text-align: center;
            background: transparent;
            border: 1px solid var(--butter-gold);
            color: var(--butter-gold);
            padding: 10px;
            border-radius: 4px;
            text-decoration: none;
            margin-top: 15px;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .card-buy-btn:hover { background: var(--butter-gold); color: #000; }

        /* --- 그리드 리스트 --- */
        .content-list {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 20px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(251, 191, 36, 0.1);
            padding: 25px;
            scroll-margin-top: 120px;
        }

        footer { padding: 50px; text-align: center; border-top: 1px solid #111; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="ads-notice">
    이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.
</div>

<canvas id="butter-dust"></canvas>

<div class="official-notice">
    전화번호, 주소, 일정, 금액 등은 변경될 수 있으므로 정확한 정보는 반드시 공식 페이지에서 재확인하십시오.
</div>

<section class="hero">
    <h1 class="main-title">전국 버터떡 비기 전도</h1>
    
    <a href="https://link.coupang.com/a/d7C4Gk" target="_blank" class="buy-button">🔥 실시간 인기 버터떡 구매하기</a>

    <div class="map-wrapper">
        <img src="http://bigfatcat.kr/wp-content/uploads/2026/03/스크린샷-2026-03-20-000001.png" class="real-map">
        <div id="map-points"></div>
    </div>
</section>

<div class="content-list" id="card-grid"></div>

<div style="text-align: center; padding: 40px 0;">
    <a href="https://link.coupang.com/a/d7C4Gk" target="_blank" class="buy-button">황금 풍미 버터떡 보러가기</a>
</div>

<footer>
    <p>정보는 틀릴 수 있고 변경될 수 있으므로 공식 링크에서 다시 확인하세요.</p>
</footer>

<script>
    const coupangLink = "https://link.coupang.com/a/d7C4Gk";
    const spots = [
        { id: 1, name: "서울 구름떡집", x: 44, y: 31, desc: "흑임자 버터 샌드 명소" },
        { id: 2, name: "서울 자연도소금빵", x: 41, y: 29, desc: "떡처럼 쫄깃한 소금버터빵" },
        { id: 3, name: "서울 경기떡집", x: 46, y: 34, desc: "망원동 명물 이티떡" },
        { id: 4, name: "춘천 정남미명가", x: 55, y: 26, desc: "감자떡 식감의 감자빵" },
        { id: 5, name: "파주 좋은날떡집", x: 38, y: 24, desc: "퓨전 모시 버터떡" },
        { id: 6, name: "인천 인천당", x: 35, y: 34, desc: "노포 감성 버터 구운 떡" },
        { id: 7, name: "정선 수리취떡", x: 65, y: 36, desc: "수리취 버터 와플 떡" },
        { id: 8, name: "춘천 감자밭", x: 57, y: 28, desc: "치즈 버터 감자떡 원조" },
        { id: 9, name: "청주 본정", x: 48, y: 52, desc: "초코 버터 떡 케이크" },
        { id: 10, name: "공주 부자떡집", x: 42, y: 58, desc: "공주 알밤 버터 찹쌀떡" },
        { id: 11, name: "대전 성심당", x: 50, y: 64, desc: "전통 쑥떡과 버터의 만남" },
        { id: 12, name: "전주 교동떡갈비", x: 38, y: 75, desc: "구워먹는 버터 치즈 가래떡" },
        { id: 13, name: "익산 농협", x: 41, y: 70, desc: "전국구 생크림 찹쌀떡" },
        { id: 14, name: "영광 민속떡집", x: 30, y: 80, desc: "모시 버터 크림 필링 떡" },
        { id: 15, name: "안동 버선버선", x: 68, y: 56, desc: "안동식 버터 인절미 구이" },
        { id: 16, name: "경주 황남빵", x: 74, y: 72, desc: "경주 퓨전 버터 앙금 떡" },
        { id: 17, name: "의령 망개떡", x: 58, y: 80, desc: "전통 속의 버터 풍미" },
        { id: 18, name: "부산 희와제과", x: 72, y: 85, desc: "버터 팥 크림 떡빵 명소" },
        { id: 19, name: "부산 명가떡집", x: 75, y: 88, desc: "서면 앙버터 설기 장인" },
        { id: 20, name: "제주 오메기떡", x: 35, y: 110, desc: "이색 버터 크림 오메기떡" },
        { id: 21, name: "제주 아베베", x: 40, y: 115, desc: "로컬 떡 필링 도너츠" },
        { id: 22, name: "전국 떡보의하루", x: 52, y: 45, desc: "대중적인 버터 꿀 설기" }
    ];

    const pointContainer = document.getElementById('map-points');
    const cardGrid = document.getElementById('card-grid');

    spots.forEach(s => {
        const marker = document.createElement('div');
        marker.className = 'marker';
        marker.style.left = `${s.x}%`;
        marker.style.top = `${s.y}%`;
        marker.onclick = () => {
            const card = document.getElementById(`spot-${s.id}`);
            card.scrollIntoView({ behavior: 'smooth' });
        };
        pointContainer.appendChild(marker);

        // 수정사항: 각 상호 하단에 '버터떡 인터넷 구매' 버튼 삽입
        cardGrid.innerHTML += `
            <div class="card" id="spot-${s.id}">
                <h3 style="color:var(--butter-gold); margin-bottom:10px;">${s.name}</h3>
                <p style="font-size:0.9rem; color:#ccc;">${s.desc}</p>
                <a href="${coupangLink}" target="_blank" class="card-buy-btn">🛒 버터떡 인터넷 구매</a>
            </div>
        `;
    });

    // 배경 애니메이션 (단순화)
    const canvas = document.getElementById('butter-dust');
    const ctx = canvas.getContext('2d');
    function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    init();
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#fbbf24';
        for(let i=0; i<50; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
