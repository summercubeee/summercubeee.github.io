<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 버터떡 대백과 | 대형 전도</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Song+Myung&display=swap');

        :root {
            --butter-gold: #fbbf24;
            --butter-deep: #f59e0b;
            --bg-dark: #020617;
            --naver-green: #03c75a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Noto Serif KR', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- 상단 고정 바 --- */
        .official-notice {
            background: var(--butter-deep); color: #000; padding: 12px; text-align: center;
            font-weight: 900; font-size: 0.9rem; position: sticky; top: 0; z-index: 1000;
        }

        /* --- 지도를 화면에 꽉 채우는 섹션 --- */
        .map-fullscreen-section {
            position: relative;
            width: 100vw;
            background: #000;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .map-container {
            position: relative;
            width: 100%;
            max-width: 1200px; /* 이미지의 비율을 유지하며 화면에 크게 배치 */
        }

        .real-map-img {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0.9;
        }

        /* --- 정밀 포인트 설정 (보내주신 이미지 지형 기준) --- */
        .marker {
            position: absolute;
            width: clamp(12px, 2vw, 20px);
            height: clamp(12px, 2vw, 20px);
            background: #fff;
            border: 3px solid var(--butter-deep);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--butter-gold);
            z-index: 10;
            transition: 0.3s ease;
        }
        .marker:hover { transform: scale(1.5); background: var(--butter-gold); }

        .tooltip {
            position: absolute; bottom: 150%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); border: 1px solid var(--butter-gold);
            padding: 5px 12px; border-radius: 4px; font-size: 0.85rem;
            white-space: nowrap; opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .marker:hover .tooltip { opacity: 1; visibility: visible; }

        /* --- 쇼핑몰 배너 --- */
        .shopping-banner {
            max-width: 1000px; margin: 60px auto; padding: 30px;
            background: linear-gradient(135deg, #1e293b, #020617);
            border: 1px solid var(--butter-gold);
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 8px;
        }
        .shop-btn {
            background: var(--butter-deep); color: #000; padding: 12px 25px;
            text-decoration: none; font-weight: 900; border: none; cursor: pointer;
        }

        /* --- 리스트 그리드 --- */
        .grid-wrap {
            max-width: 1200px; margin: 0 auto 100px; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(251, 191, 36, 0.1);
            padding: 25px; transition: 0.3s;
        }
        .card:hover { border-color: var(--butter-gold); background: rgba(255,255,255,0.05); }

        .btn-naver {
            display: block; width: 100%; margin-top: 15px; padding: 10px;
            border: 1px solid var(--naver-green); color: var(--naver-green);
            text-align: center; text-decoration: none; font-size: 0.8rem; font-weight: bold;
        }
        .btn-naver:hover { background: var(--naver-green); color: #fff; }

        #btn-top {
            position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px;
            background: var(--butter-gold); border: none; border-radius: 50%;
            font-weight: bold; cursor: pointer; z-index: 100;
        }

        @media (max-width: 768px) {
            .shopping-banner { flex-direction: column; text-align: center; gap: 20px; }
        }
    </style>
</head>
<body>

<div class="official-notice">
    정확한 주소, 시간, 금액 정보는 변경될 수 있으므로 반드시 네이버 지도 등 공식 페이지에서 재확인하십시오.
</div>

<header style="text-align: center; padding: 60px 20px;">
    <h1 style="font-family:'Song Myung'; font-size: clamp(2rem, 5vw, 4rem); color: var(--butter-gold);">전국 버터떡 대백과 전도</h1>
</header>

<section class="map-fullscreen-section">
    <div class="map-container">
        <img src="http://bigfatcat.kr/wp-content/uploads/2026/03/스크린샷-2026-03-20-000001.png" class="real-map-img">
        
        <div id="points-container"></div>
    </div>
</section>

<div class="shopping-banner">
    <div>
        <h2 style="color:var(--butter-gold); margin-bottom:5px;">장인의 버터떡 쇼핑하기</h2>
        <p style="color:#888; font-size:0.9rem;">클릭하시면 엄선된 버터떡 전문 쇼핑몰로 연결됩니다.</p>
    </div>
    <button onclick="alert('쿠팡 등 전문 쇼핑몰 링크를 여기에 연결하세요')" class="shop-btn">쇼핑몰 바로가기 〉</button>
</div>

<div class="grid-wrap" id="card-grid"></div>

<button id="btn-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">TOP</button>

<footer style="padding: 60px; text-align: center; color: #444; font-size: 0.8rem;">
    <p>정보는 틀릴 수 있고 변경될 수 있으므로 공식 링크에서 다시 확인하세요. &copy; 2026</p>
</footer>

<script>
    // 이미지 지형에 맞춰 재조정된 정밀 좌표 (전국 22개 거점)
    const spots = [
        { name: "서울 강남구(새들러)", x: 44.5, y: 31.0 }, { name: "서울 성동구(하츠)", x: 46.5, y: 29.5 },
        { name: "인천 미추홀구", x: 38.0, y: 32.5 }, { name: "경기 안성(오브더밀)", x: 48.0, y: 45.0 },
        { name: "경기 평택(비에델)", x: 45.0, y: 48.0 }, { name: "강원 춘천", x: 58.0, y: 24.0 },
        { name: "강원 정선", x: 65.0, y: 32.0 }, { name: "충북 청주", x: 52.0, y: 48.0 },
        { name: "충남 공주", x: 43.0, y: 55.0 }, { name: "대전 서구", x: 49.0, y: 58.0 },
        { name: "전북 전주", x: 41.0, y: 70.0 }, { name: "전북 익산", x: 44.0, y: 65.0 },
        { name: "광주광역시", x: 39.0, y: 78.0 }, { name: "전남 영광", x: 32.0, y: 82.0 },
        { name: "경북 안동", x: 68.0, y: 48.0 }, { name: "경북 경주", x: 74.0, y: 65.0 },
        { name: "대구 중구", x: 67.0, y: 62.0 }, { name: "경남 의령", x: 58.0, y: 75.0 },
        { name: "부산 전포동", x: 72.0, y: 82.0 }, { name: "제주 아베베", x: 38.0, y: 94.0 },
        { name: "서울 마포구", x: 42.0, y: 30.5 }, { name: "서울 관악구", x: 44.0, y: 34.0 }
    ];

    const pointContainer = document.getElementById('points-container');
    const cardGrid = document.getElementById('card-grid');

    spots.forEach(s => {
        // 포인트 생성
        const marker = document.createElement('div');
        marker.className = 'marker';
        marker.style.left = `${s.x}%`;
        marker.style.top = `${s.y}%`;
        marker.innerHTML = `<div class="tooltip">${s.name}</div>`;
        
        // 클릭 시 네이버 지도 검색 연동
        marker.onclick = () => window.open(`https://map.naver.com/v5/search/${encodeURIComponent(s.name + ' 버터떡')}`, '_blank');
        pointContainer.appendChild(marker);

        // 카드 생성
        cardGrid.innerHTML += `
            <div class="card">
                <h3 style="color:var(--butter-gold); margin-bottom:10px;">${s.name}</h3>
                <p style="font-size:0.85rem; color:#888;">지역을 대표하는 버터떡 명소를 네이버 지도에서 상세히 확인해 보세요.</p>
                <a href="https://map.naver.com/v5/search/${encodeURIComponent(s.name)}" target="_blank" class="btn-naver">📍 네이버 지도 확인</a>
            </div>
        `;
    });
</script>

</body>
</html>
