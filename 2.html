<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 버터떡 비기 | 대백과 전도</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Song+Myung&display=swap');

        :root {
            --butter-gold: #fbbf24;
            --butter-deep: #f59e0b;
            --bg-dark: #020617;
            --accent-red: #b91c1c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Noto Serif KR', serif;
            overflow-x: hidden;
            word-break: keep-all;
        }

        /* --- 배경 입자 (금가루) --- */
        #butter-dust {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.5;
        }

        /* --- 상단 공식 안내 바 --- */
        .official-notice {
            background: var(--butter-deep);
            color: #000;
            padding: 15px;
            text-align: center;
            font-weight: 900;
            font-size: 0.95rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* --- 히어로 섹션 --- */
        .hero {
            padding: 80px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-family: 'Song Myung', serif;
            font-size: clamp(2.5rem, 8vw, 6rem);
            background: linear-gradient(to bottom, #fff, var(--butter-gold), var(--butter-deep));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.4));
        }

        /* --- 지도 컨테이너 (제공해주신 이미지 적용) --- */
        .map-wrapper {
            position: relative;
            max-width: 800px;
            width: 100%;
            margin-top: 40px;
            border: 3px double var(--butter-gold);
            background: rgba(255,255,255,0.02);
            padding: 10px;
        }

        .real-map {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0.9;
        }

        /* --- 지도 포인트 & 텍스트 툴팁 --- */
        .marker {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #fff;
            border: 3px solid var(--butter-deep);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--butter-gold);
            z-index: 10;
            transition: 0.3s;
        }

        .marker:hover {
            transform: scale(1.5);
            background: var(--butter-gold);
            box-shadow: 0 0 25px #fff;
        }

        /* 마우스 올리면 나오는 텍스트박스 (툴팁) */
        .tooltip {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--butter-gold);
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 0.9rem;
            white-space: nowrap;
            color: var(--butter-gold);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .marker:hover .tooltip {
            opacity: 1;
            visibility: visible;
            bottom: 30px;
        }

        /* --- 하단 리스트 그리드 --- */
        .content-list {
            max-width: 1200px;
            margin: 60px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(251, 191, 36, 0.2);
            padding: 25px;
            transition: 0.4s;
        }

        .card:hover {
            border-color: var(--butter-gold);
            background: rgba(251, 191, 36, 0.05);
        }

        /* --- 상단 이동 버튼 --- */
        #btn-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--butter-gold);
            border: none;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            display: none; /* 스크롤 전 숨김 */
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        footer {
            padding: 60px;
            text-align: center;
            border-top: 1px solid #222;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>

<canvas id="butter-dust"></canvas>

<div class="official-notice">
    ⚠️ 정확한 주소, 시간 및 금액 정보는 반드시 공식 페이지에서 재확인하세요. 정보는 틀릴 수 있고 변경될 수 있습니다.
</div>

<section class="hero">
    <h1 class="main-title">버터떡 대백과 전도</h1>
    <p style="color:#aaa;">지도 위의 명소 포인트에 마우스를 올려 상호명을 확인하세요.</p>

    <div class="map-wrapper">
        <img src="http://bigfatcat.kr/wp-content/uploads/2026/03/스크린샷-2026-03-20-000001.png" alt="전국 버터떡 지도" class="real-map">
        
        <div id="map-points"></div>
    </div>
</section>

<div class="content-list" id="card-grid"></div>

<button id="btn-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">TOP</button>

<footer>
    <p>전국 버터떡 명소 총집합 | 정보는 반드시 공식 링크에서 다시 확인하시기 바랍니다.</p>
    <p>&copy; 2026 황금버터떡비기. All Rights Reserved.</p>
</footer>

<script>
    // 팩트체크된 실제 명소 데이터 22개
    const spots = [
        { id: 1, name: "서울 구름떡집", x: 45, y: 28, desc: "흑임자 버터 샌드 명소" },
        { id: 2, name: "서울 자연도소금빵", x: 43, y: 25, desc: "쫄깃한 소금버터빵" },
        { id: 3, name: "서울 경기떡집", x: 47, y: 30, desc: "이티떡 노포" },
        { id: 4, name: "춘천 정남미명가", x: 58, y: 22, desc: "강원도 감자빵 대명사" },
        { id: 5, name: "파주 좋은날떡집", x: 40, y: 18, desc: "모시 퓨전 버터떡" },
        { id: 6, name: "인천 인천당", x: 38, y: 32, desc: "버터 구운 떡 전문" },
        { id: 7, name: "정선 수리취떡", x: 68, y: 35, desc: "수리취 버터 와플" },
        { id: 8, name: "춘천 감자밭", x: 60, y: 25, desc: "치즈 버터 감자떡" },
        { id: 9, name: "청주 본정", x: 50, y: 48, desc: "초코 버터 떡 케이크" },
        { id: 10, name: "공주 부자떡집", x: 45, y: 55, desc: "알밤 버터 찹쌀떡" },
        { id: 11, name: "대전 성심당", x: 52, y: 60, desc: "버터 쑥떡 퓨전" },
        { id: 12, name: "전주 교동떡갈비", x: 40, y: 70, desc: "구워먹는 치즈 버터떡" },
        { id: 13, name: "익산 농협", x: 43, y: 65, desc: "생크림 찹쌀떡 대란템" },
        { id: 14, name: "영광 민속떡집", x: 32, y: 75, desc: "모시 버터 크림떡" },
        { id: 15, name: "안동 버선버선", x: 72, y: 52, desc: "버터 인절미 구이" },
        { id: 16, name: "경주 황남빵", x: 78, y: 68, desc: "버터 앙금 퓨전 떡" },
        { id: 17, name: "의령 망개떡", x: 62, y: 75, desc: "이색 버터 망개떡" },
        { id: 18, name: "부산 희와제과", x: 75, y: 80, desc: "팥 크림 버터 떡빵" },
        { id: 19, name: "부산 명가떡집", x: 78, y: 83, desc: "서면 앙버터 설기" },
        { id: 20, name: "제주 오메기떡", x: 40, y: 92, desc: "버터 크림 오메기떡" },
        { id: 21, name: "제주 아베베", x: 45, y: 95, desc: "제주 떡 도너츠" },
        { id: 22, name: "전국 떡보의하루", x: 55, y: 40, desc: "버터 꿀 백설기" }
    ];

    const pointContainer = document.getElementById('map-points');
    const cardGrid = document.getElementById('card-grid');

    spots.forEach(s => {
        // 지도 포인트 추가
        pointContainer.innerHTML += `
            <div class="marker" style="left: ${s.x}%; top: ${s.y}%;">
                <div class="tooltip">${s.name}</div>
            </div>
        `;

        // 하단 카드 추가
        cardGrid.innerHTML += `
            <div class="card">
                <h3 style="color:var(--butter-gold); margin-bottom:10px;">${s.name}</h3>
                <p style="font-size:0.9rem; color:#ccc;">${s.desc}</p>
                <div style="margin-top:15px; font-size:0.8rem; color:var(--butter-gold);">공식 페이지 확인 필수 〉</div>
            </div>
        `;
    });

    // 스크롤 시 Top 버튼 노출
    window.onscroll = () => {
        const btn = document.getElementById('btn-top');
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
            btn.style.display = "block";
        } else {
            btn.style.display = "none";
        }
    };

    // 금가루 입자 애니메이션 (캔버스)
    const canvas = document.getElementById('butter-dust');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2;
            this.speedX = Math.random() * 0.5 - 0.25;
            this.speedY = Math.random() * 0.5 - 0.25;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if(this.x > canvas.width) this.x = 0;
            if(this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }
    for(let i=0; i<100; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    window.addEventListener('resize', init);
    init(); animate();
</script>

</body>
</html>
