<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 버터떡 비기 | 대백과 전도</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Song+Myung&display=swap');

        :root {
            --butter-gold: #fbbf24;
            --butter-deep: #f59e0b;
            --bg-dark: #020617;
            --naver-green: #03c75a;
            --cta-gold: #d97706;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Noto Serif KR', serif;
            overflow-x: hidden;
            word-break: keep-all;
            scroll-behavior: smooth;
        }

        .ads-notice { background: #111; color: #555; font-size: 0.7rem; padding: 8px; text-align: center; border-bottom: 1px solid #222; }

        .official-notice {
            background: var(--butter-deep); color: #000; padding: 12px; text-align: center;
            font-weight: 900; font-size: 0.85rem; position: sticky; top: 0; z-index: 1000;
        }

        .hero { padding: 80px 20px; text-align: center; }
        .main-title {
            font-family: 'Song Myung', serif;
            font-size: clamp(2.5rem, 7vw, 5rem);
            background: linear-gradient(to bottom, #fff, var(--butter-gold), var(--butter-deep));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        /* --- 수정사항1: 지도 1.8배 확대 및 레이아웃 --- */
        .map-section {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 100px;
        }

        .map-wrapper {
            position: relative; 
            width: 100%; 
            max-width: 1440px; /* 지도를 훨씬 크게 확장 */
            border: 1px solid rgba(251, 191, 36, 0.2);
            background: #000;
            overflow: hidden;
        }

        .real-map { 
            width: 100%; 
            height: auto; 
            display: block; 
            opacity: 0.85;
            transform: scale(1); /* 1.8배 확대 개념으로 컨테이너 가득 채움 */
        }

        /* --- 수정사항2: 정밀 좌표 시스템 --- */
        .marker {
            position: absolute; width: 24px; height: 24px; background: #fff;
            border: 4px solid var(--butter-deep); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 20px var(--butter-gold); z-index: 10; transition: 0.3s;
        }
        .marker:hover { transform: scale(1.3); background: var(--butter-gold); }
        
        .marker-tooltip {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); border: 1px solid var(--butter-gold);
            color: #fff; padding: 6px 15px; border-radius: 4px; font-size: 0.9rem;
            white-space: nowrap; opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .marker:hover .marker-tooltip { opacity: 1; visibility: visible; }

        /* --- 수정사항3: 쇼핑몰 CTA 분리 디자인 --- */
        .shopping-banner {
            max-width: 1200px; margin: 40px auto;
            background: linear-gradient(90deg, #1e293b, #0f172a);
            border: 1px solid var(--butter-gold);
            padding: 30px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cta-text h2 { color: var(--butter-gold); font-size: 1.5rem; margin-bottom: 5px; }
        .cta-text p { color: #94a3b8; font-size: 0.9rem; }

        .btn-shop {
            background: var(--cta-gold); color: #fff; padding: 12px 30px;
            border-radius: 4px; font-weight: 800; text-decoration: none;
            transition: 0.3s; border: none; cursor: pointer;
        }
        .btn-shop:hover { background: #b45309; box-shadow: 0 0 15px var(--butter-gold); }

        /* 리스트 그리드 */
        .content-list {
            max-width: 1200px; margin: 40px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px;
        }
        .card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 25px; transition: 0.4s; position: relative;
        }
        .card:hover { border-color: var(--butter-gold); background: rgba(251, 191, 36, 0.05); }

        .btn-naver {
            display: block; width: 100%; margin-top: 20px; padding: 10px;
            border: 1px solid var(--naver-green); color: var(--naver-green);
            text-align: center; text-decoration: none; font-size: 0.8rem; font-weight: bold;
        }
        .btn-naver:hover { background: var(--naver-green); color: #fff; }

        footer { padding: 80px; text-align: center; border-top: 1px solid #111; color: #444; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .shopping-banner { flex-direction: column; text-align: center; gap: 20px; margin: 20px; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="ads-notice">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div>

<div class="official-notice">
    ⚠️ 위치, 시간, 금액 정보는 변경될 수 있습니다. 정확한 정보는 네이버 지도 등 공식 페이지에서 꼭 재확인하십시오.
</div>

<section class="hero">
    <h1 class="main-title">전국 버터떡 대백과</h1>
    
    <div class="map-section">
        <div class="map-wrapper">
            <img src="http://bigfatcat.kr/wp-content/uploads/2026/03/스크린샷-2026-03-20-000001.png" class="real-map">
            <div id="map-points"></div>
        </div>
    </div>

    <div class="shopping-banner">
        <div class="cta-text">
            <h2>전설의 버터떡을 집에서 만나보세요</h2>
            <p>엄선된 품질의 버터떡을 온라인 쇼핑몰에서 간편하게 주문할 수 있습니다.</p>
        </div>
        <button onclick="showShopPopup()" class="btn-shop">전문 쇼핑몰에서 구매하기 〉</button>
    </div>
</section>

<div class="content-list" id="card-grid"></div>

<footer>
    <p>정보는 틀릴 수 있으므로 공식 링크에서 다시 확인하세요.</p>
    <p style="margin-top:10px;">&copy; 2026 전국 버터떡 비기(祕記)</p>
</footer>

<script>
    // 수정사항: 정밀 좌표 재조정 (이미지 비율에 최적화)
    const regions = [
        { name: "서울", x: 45.5, y: 28.5 }, { name: "경기", x: 44.0, y: 22.0 }, { name: "인천", x: 39.5, y: 30.5 },
        { name: "강원", x: 62.0, y: 19.5 }, { name: "충북", x: 55.5, y: 46.0 }, { name: "충남", x: 39.0, y: 56.5 },
        { name: "대전", x: 48.5, y: 58.5 }, { name: "경북", x: 71.5, y: 56.0 }, { name: "대구", x: 69.5, y: 66.5 },
        { name: "전북", x: 41.5, y: 72.5 }, { name: "전남", x: 34.5, y: 86.5 }, { name: "광주", x: 38.0, y: 79.5 },
        { name: "경남", x: 61.5, y: 81.5 }, { name: "부산", x: 76.0, y: 86.5 }, { name: "제주", x: 39.5, y: 94.5 }
    ];

    const spots = [
        { name: "새들러하우스", feature: "상하이식 버터 쫀득떡(플레인·초코·치즈)", location: "서울 강남구" },
        { name: "이웃집통통이", feature: "글루텐 프리 상하이 버터떡", location: "서울 강남구·마포구" },
        { name: "하우스엠", feature: "하트 모양 겉바속쫀 버터떡", location: "서울 강남구" },
        { name: "하츠베이커리 성수", feature: "왕버터떡(대형 버터떡)", location: "서울 성동구" },
        { name: "늘해피", feature: "버터떡 2개·5개 묶음 판매", location: "서울 강남구" },
        { name: "구십이도", feature: "밤톨 모양 버터떡", location: "서울 광진구" },
        { name: "카페봉맨션", feature: "카페 버터떡 메뉴 판매", location: "서울 서대문구" },
        { name: "오우드(Oude)", feature: "마들렌 모양 버터떡", location: "서울 성동구" },
        { name: "데이라이트", feature: "디저트 플래터에 버터떡 구성", location: "서울 구로구" },
        { name: "온기", feature: "자라메 설탕 단짠 버터떡", location: "서울 서초구" },
        { name: "카페 이오이", feature: "하트 모양 버터떡", location: "서울 마포구" },
        { name: "좋은자리", feature: "버터구이 안주 메뉴", location: "서울 가로수길" },
        { name: "오복떡집", feature: "성수동 버터 떡구이류", location: "서울 성동구" },
        { name: "정애맛담", feature: "담백한 버터 떡구이", location: "서울 샤로수길" },
        { name: "도올쇠 서울대입구", feature: "술안주형 버터 떡구이", location: "서울 관악구" },
        { name: "수제과점", feature: "상하이 버터떡 전문점", location: "인천 미추홀구" },
        { name: "오브더밀", feature: "안성 상하이 버터떡 맛집", location: "경기 안성시" },
        { name: "비에델", feature: "평택 고덕 버터떡 명소", location: "경기 평택시" },
        { name: "광주 BBB", feature: "광주광역시 버터떡 핫플", location: "광주광역시" },
        { name: "기타 지역 명소", feature: "전국 버터떡 카페 76곳 중 선별", location: "서울·경기 다수" }
    ];

    const pointContainer = document.getElementById('map-points');
    const cardGrid = document.getElementById('card-grid');

    regions.forEach(r => {
        const marker = document.createElement('div');
        marker.className = 'marker';
        marker.style.left = `${r.x}%`;
        marker.style.top = `${r.y}%`;
        marker.innerHTML = `<div class="marker-tooltip">${r.name} 지역 탐색하기</div>`;
        marker.onclick = () => {
            window.open(`https://map.naver.com/v5/search/${encodeURIComponent(r.name + ' 버터떡')}`, '_blank');
        };
        pointContainer.appendChild(marker);
    });

    spots.forEach(s => {
        cardGrid.innerHTML += `
            <div class="card">
                <div style="font-size:0.75rem; color:var(--butter-gold); margin-bottom:5px;">${s.location}</div>
                <h3 style="margin-bottom:8px;">${s.name}</h3>
                <p style="font-size:0.85rem; color:#888; line-height:1.5;">${s.feature}</p>
                <a href="https://map.naver.com/v5/search/${encodeURIComponent(s.name)}" target="_blank" class="btn-naver">📍 네이버 지도에서 확인</a>
            </div>
        `;
    });

    function showShopPopup() {
        alert("전문 온라인 쇼핑몰로 연결됩니다. (쿠팡 링크 등을 여기에 연결하세요)");
    }
</script>
</body>
</html>
